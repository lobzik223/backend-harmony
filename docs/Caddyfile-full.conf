# Корень — лендинг Harmony-site (сборка из Harmony-site: npm run build → содержимое dist в /var/www/harmony-site)
harmonymeditation.online {
    root * /var/www/harmony-site
    file_server
    handle_errors {
        @404 expression {err.status_code} == 404
        handle @404 {
            rewrite * /index.html
            file_server
        }
    }
    header {
        X-Frame-Options "SAMEORIGIN"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
    }
    encode gzip zstd
}

http://harmonymeditation.online {
    root * /var/www/harmony-site
    file_server
    handle_errors {
        @404 expression {err.status_code} == 404
        handle @404 {
            rewrite * /index.html
            file_server
        }
    }
    header {
        X-Frame-Options "SAMEORIGIN"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
    }
    encode gzip zstd
}

# API — HTTPS (443) и по Host для CDN на 80
api.harmonymeditation.online {
    reverse_proxy localhost:3000 {
        header_up X-Harmony-App-Key {http.request.header.X-Harmony-App-Key}
    }
}

